<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>IDC Business Suite</title>
    <style>
        :root { --bg: #0b0b0e; --surface: #16161a; --primary: #00ff88; --received: #00ff88; --sent: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .page { display: none; } .active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: var(--surface); border: 1px solid #333; padding: 15px; color: white; border-radius: 8px; cursor: pointer; }
        .input { width: 100%; padding: 10px; margin: 5px 0; background: var(--surface); color: white; border: 1px solid #333; box-sizing: border-box; }
        .card { background: var(--surface); padding: 10px; margin: 5px 0; border-left: 4px solid var(--primary); font-size: 0.9em; display: flex; justify-content: space-between; align-items: center; }
        .summary-box { background: #222; padding: 15px; border-radius: 8px; border: 1px solid var(--primary); margin-bottom: 20px; display: flex; justify-content: space-around; text-align: center; }
        .table-view { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="hub" class="page active">
        <h2>IDC Dashboard</h2>
        <div class="grid">
            <button class="btn" onclick="openPanel('Shop')">Shop Panel</button>
            <button class="btn" onclick="openPanel('Factory')">Factory Panel</button>
        </div>
        
        <div style="margin-top: 30px; padding: 15px; border: 1px solid var(--primary); border-radius: 8px;">
            <h3>🔍 Filter or Retrieve Data</h3>
            <select id="globalPanel" class="input"><option value="Shop">Shop Panel</option><option value="Factory">Factory Panel</option></select>
            <input type="date" id="globalDate" class="input">
            <input type="text" id="globalName" class="input" placeholder="Search by Name/Detail...">
            <select id="globalCategory" class="input">
                <option value="">All Categories</option>
                <option value="Purchasing">Purchasing</option><option value="Expenses">Expenses</option>
                <option value="Salary">Salary</option><option value="Loan">Loan</option><option value="Supply">Supply</option>
            </select>
            <button class="btn" style="width:100%; margin-top:10px; background:var(--primary); color:black; font-weight:bold;" onclick="searchGlobal()">Search Results</button>
            <div id="globalResults"></div>
        </div>
    </div>

    <div id="panelView" class="page">
        <button class="btn" onclick="location.reload()">← Back</button>
        <h2 id="pTitle"></h2>
        <div id="accountContent">
            <div id="summaryArea" class="summary-box" style="display:none;">
                <div><span id="labelL">Loan</span><br><b id="sumRec" style="color:var(--received)">0</b></div>
                <div><span id="labelP">Paid</span><br><b id="sumSent" style="color:var(--sent)">0</b></div>
                <div>Balance<br><b id="sumBal">0</b></div>
            </div>
            <div id="subTabs" class="grid"></div>
            <div id="editorArea" style="display:none; margin-top:20px; border:1px solid #333; padding:10px;">
                <input type="hidden" id="editId">
                <input type="date" id="dateIn" class="input">
                <input type="text" id="nameIn" class="input" placeholder="Product/Detail">
                <input type="number" id="amtIn" class="input" placeholder="Amount">
                <select id="moveType" class="input"></select>
                <button id="saveBtn" class="btn" style="width:100%; background:var(--primary); color:black;" onclick="saveEntry()">Save Data</button>
            </div>
            <div id="displayArea" class="table-view" style="display:none;">
                <div id="receivedList"><h4 id="headL">Received</h4></div>
                <div id="saleList"><h4 id="headP">Sent</h4></div>
            </div>
            <div id="simpleList" style="margin-top:20px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const db = getDatabase(initializeApp({ databaseURL: "https://idcstock-default-rtdb.firebaseio.com/" }));
        window.removeEntry = (id) => { if(confirm('Delete this entry?')) remove(ref(db, 'records/' + id)); };
        
        window.editEntry = (id) => {
            const entry = allRecords.find(r => r.id === id);
            document.getElementById('editId').value = entry.id;
            document.getElementById('dateIn').value = entry.date;
            document.getElementById('nameIn').value = entry.name;
            document.getElementById('amtIn').value = entry.total;
            document.getElementById('moveType').value = entry.type;
            document.getElementById('saveBtn').innerText = "Update Data";
        };

        let state = { parent: '', sub: '', finalSub: '' };
        let allRecords = [];

        const structure = { "Shop": ["Purchasing", "Expenses", "Salary", "Loan", "Supply"], "Factory": ["Purchasing", "Salary", "Expenses", "Supply", "Loan"] };
        const subCategories = { 
            "Purchasing": ["Counter", "Abdullah", "Heera"], 
            "Salary": ["Daily Wages", "Monthly"], 
            "Loan": ["Loan"], 
            "Supply": ["Shop", "Arshan", "Gillani", "T.Chowk", "Moor", "Haris", "Amjad Multan", "Amjad Shujabad", "Factory Sale"] 
        };

        window.openPanel = (p) => {
            document.getElementById('hub').className = 'page';
            document.getElementById('panelView').className = 'page active';
            document.getElementById('pTitle').innerText = p + " Panel";
            state.parent = p;
            document.getElementById('subTabs').innerHTML = structure[p].map(t => `<button class="btn" onclick="selectCategory('${t}')">${t}</button>`).join('');
        };

        window.selectCategory = (sub) => {
            state.sub = sub;
            if (sub === 'Supply' && state.parent === 'Shop') {
                document.getElementById('subTabs').innerHTML = ["Shop", "Arshan", "Gillani"].map(t => `<button class="btn" style="border: 1px solid var(--primary)" onclick="setFinalSub('${t}')">${t}</button>`).join('');
            } else if (subCategories[sub]) {
                document.getElementById('subTabs').innerHTML = subCategories[sub].map(t => `<button class="btn" style="border: 1px solid var(--primary)" onclick="setFinalSub('${t}')">${t}</button>`).join('');
            } else { setFinalSub(sub); }
        };

        window.setFinalSub = (finalSub) => {
            state.finalSub = finalSub;
            document.getElementById('pTitle').innerText = `${state.parent} > ${state.sub} > ${finalSub}`;
            const isLoan = (state.sub === 'Loan');
            document.getElementById('labelL').innerText = isLoan ? "Loan" : "Received";
            document.getElementById('labelP').innerText = isLoan ? "Paid" : "Sent";
            document.getElementById('headL').innerText = isLoan ? "Loan" : "Received";
            document.getElementById('headP').innerText = isLoan ? "Paid" : "Sent";
            const moveSelect = document.getElementById('moveType');
            moveSelect.innerHTML = isLoan ? `<option value="Received">Loan</option><option value="Sale">Paid</option>` : `<option value="Received">Received</option><option value="Sale">Sent</option>`;
            document.getElementById('subTabs').innerHTML = (state.sub === 'Loan') ? `<input type="text" id="nameFilter" class="input" placeholder="Enter Name..."><button class="btn" style="width:100%" onclick="render()">Get Result</button>` : '';
            document.getElementById('editorArea').style.display = 'block';
            document.getElementById('moveType').style.display = (state.sub === 'Loan' || state.sub === 'Supply') ? 'block' : 'none';
            render();
        };

        window.saveEntry = () => {
            const id = document.getElementById('editId').value;
            const data = { 
                parent: state.parent, sub: state.sub, finalSub: state.finalSub,
                date: document.getElementById('dateIn').value,
                name: document.getElementById('nameIn').value,
                total: document.getElementById('amtIn').value,
                type: (state.sub === 'Loan' || state.sub === 'Supply') ? document.getElementById('moveType').value : 'Entry'
            };
            if(id) { update(ref(db, 'records/' + id), data).then(() => { alert("Updated!"); resetForm(); }); }
            else { push(ref(db, 'records'), data).then(() => { alert("Saved!"); resetForm(); }); }
        };

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('saveBtn').innerText = "Save Data";
            render();
        }

        onValue(ref(db, 'records'), (s) => {
            const data = s.val();
            allRecords = data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : [];
            if (state.finalSub) render();
        });

        window.render = () => {
            const filter = document.getElementById('nameFilter') ? document.getElementById('nameFilter').value.toLowerCase() : "";
            let list = allRecords.filter(r => r.parent === state.parent && r.sub === state.sub && r.finalSub === state.finalSub);
            if (state.sub === 'Loan' && filter !== "") list = list.filter(r => r.name.toLowerCase().includes(filter));
            const isSpecial = (state.sub === 'Loan' || state.sub === 'Supply');
            document.getElementById('summaryArea').style.display = isSpecial ? 'flex' : 'none';
            document.getElementById('displayArea').style.display = isSpecial ? 'grid' : 'none';
            document.getElementById('simpleList').style.display = isSpecial ? 'none' : 'block';
            const itemHtml = (r) => `<div>${r.date} | ${r.name}: ${r.total}</div><div><button onclick="editEntry('${r.id}')">✏️</button><button onclick="removeEntry('${r.id}')" style="color:red;">❌</button></div>`;
            if (isSpecial) {
                const rec = list.filter(r => r.type === 'Received').reduce((sum, r) => sum + Number(r.total || 0), 0);
                const sent = list.filter(r => r.type === 'Sale').reduce((sum, r) => sum + Number(r.total || 0), 0);
                document.getElementById('sumRec').innerText = rec;
                document.getElementById('sumSent').innerText = sent;
                document.getElementById('sumBal').innerText = (rec - sent);
                document.getElementById('receivedList').innerHTML = `<h4>${document.getElementById('headL').innerText}</h4>` + list.filter(r => r.type === 'Received').map(r => `<div class="card">${itemHtml(r)}</div>`).join('');
                document.getElementById('saleList').innerHTML = `<h4>${document.getElementById('headP').innerText}</h4>` + list.filter(r => r.type === 'Sale').map(r => `<div class="card">${itemHtml(r)}</div>`).join('');
            } else {
                document.getElementById('simpleList').innerHTML = list.map(r => `<div class="card">${itemHtml(r)}</div>`).join('');
            }
        };

        window.searchGlobal = () => {
            const pF = document.getElementById('globalPanel').value, dF = document.getElementById('globalDate').value, nF = document.getElementById('globalName').value.toLowerCase(), cF = document.getElementById('globalCategory').value;
            const results = allRecords.filter(r => (r.parent === pF) && (dF === "" || r.date === dF) && (nF === "" || r.name.toLowerCase().includes(nF)) && (cF === "" || r.sub === cF));
            document.getElementById('globalResults').innerHTML = results.map(r => `<div class="card"><b>${r.name}</b> (${r.finalSub})<br>${r.date} | ${r.total} <button onclick="removeEntry('${r.id}')" style="color:red;">❌</button></div>`).join('');
        };
    </script>
</body>
</html>
