<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>IDC Business Suite</title>
    <style>
        :root { --bg: #0b0b0e; --surface: #16161a; --primary: #00ff88; --receive: #00ff88; --provide: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; }
        .page { display: none; } .active { display: block; }
        .btn { background: var(--surface); border: 1px solid #333; padding: 12px; color: white; border-radius: 8px; cursor: pointer; width: 100%; margin: 5px 0; }
        .input { width: 100%; padding: 12px; margin: 5px 0; background: var(--surface); color: white; border: 1px solid #333; box-sizing: border-box; border-radius: 5px; }
        .card { background: var(--surface); padding: 10px; margin: 5px 0; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .summary-box { background: #222; padding: 10px; border-radius: 8px; border: 1px solid var(--primary); display: flex; justify-content: space-around; text-align: center; margin-bottom: 10px; }
        @media print { .no-print { display: none; } body { background: white; color: black; } }
    </style>
</head>
<body>

    <div id="hub" class="page active">
        <h2>IDC Dashboard</h2>
        <div class="no-print">
            <button class="btn" style="background:#333" onclick="window.print()">🖨️ Print Report</button>
            <button class="btn" style="background:#550000" onclick="adminClear()">⚠️ Remove All History</button>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn" onclick="secureOpen('Shop')">Shop Panel</button>
                <button class="btn" onclick="secureOpen('Factory')">Factory Panel</button>
            </div>
        </div>
        
        <div style="margin-top:20px; border:1px solid #444; padding:15px; border-radius:8px;">
            <h3>🔍 Global Filter</h3>
            <select id="gPanel" class="input" onchange="updateSub('g')"><option value="Shop">Shop</option><option value="Factory">Factory</option></select>
            <input type="date" id="gDate" class="input">
            <select id="gCat" class="input" onchange="updateSub('g')"><option value="Purchasing">Purchasing</option><option value="Expenses">Expenses</option><option value="Salary">Salary</option><option value="Supply">Supply</option></select>
            <select id="gSub" class="input"></select>
            <button class="btn" style="background:var(--primary); color:black;" onclick="searchGlobal()">Search Results</button>
            <div id="totalsArea" class="summary-box" style="display:none;">
                <div>Receive<br><b id="gRec" style="color:var(--receive)">0</b></div>
                <div>Provide<br><b id="gPro" style="color:var(--provide)">0</b></div>
                <div>Bal<br><b id="gBal">0</b></div>
            </div>
            <div id="gResults"></div>
        </div>
    </div>

    <div id="panelView" class="page">
        <button class="btn" onclick="location.reload()">← Back</button>
        <h2 id="pTitle"></h2>
        <div class="summary-box">
            <div>Receive<br><b id="sumRec" style="color:var(--receive)">0</b></div>
            <div>Provide<br><b id="sumPro" style="color:var(--provide)">0</b></div>
            <div>Bal<br><b id="sumBal">0</b></div>
        </div>
        
        <input type="hidden" id="editId">
        <input type="text" id="nameFilter" class="input" placeholder="Search by name..." oninput="render()">
        <select id="catSelect" class="input" onchange="updateSub('p'); render();">
            <option value="Purchasing">Purchasing</option><option value="Expenses">Expenses</option>
            <option value="Salary">Salary</option><option value="Supply">Supply</option>
        </select>
        <select id="subSelect" class="input" onchange="render()"></select>
        
        <div style="border:1px solid #444; padding:10px; border-radius:8px;">
            <input type="date" id="dateIn" class="input">
            <input type="text" id="nameIn" class="input" placeholder="Details/Name">
            <input type="number" id="amtIn" class="input" placeholder="Amount">
            <select id="typeIn" class="input"><option value="Receive">Receive</option><option value="Provide">Provide</option></select>
            <button id="saveBtn" class="btn" style="background:var(--primary); color:black;" onclick="saveData()">Save Data</button>
        </div>
        <div id="displayArea"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://idcstock-default-rtdb.firebaseio.com/" }));
        let allRecords = [];
        
        const subs = {
            "Shop": { "Salary": ["Daily Wages", "Monthly", "Loan"], "Supply": ["Shop", "Arshan", "Gillani"] },
            "Factory": { "Salary": ["Daily Wages", "Monthly", "Loan"], "Supply": ["Factory Sale", "Haris", "Amjad Multan", "Amjad Shujabad", "Gilani", "Arshan", "T.Chowk", "Moor"] }
        };

        window.adminClear = () => { if(prompt("Enter PIN:") === "6677") set(ref(db, 'records'), null); };
        window.secureOpen = (p) => { if(prompt("Enter PIN for " + p + ":") === "6677") openPanel(p); else alert("Invalid PIN!"); };
        window.removeEntry = (id) => { remove(ref(db, 'records/' + id)); };

        window.updateSub = (context) => {
            const p = (context === 'g') ? document.getElementById('gPanel').value : document.getElementById('pTitle').innerText.split(' ')[0];
            const cat = document.getElementById(context === 'g' ? 'gCat' : 'catSelect').value;
            const subEl = document.getElementById(context === 'g' ? 'gSub' : 'subSelect');
            const options = (subs[p] && subs[p][cat]) ? subs[p][cat] : [];
            subEl.innerHTML = options.map(s => `<option value="${s}">${s}</option>`).join('');
        };
        
        window.openPanel = (p) => {
            document.getElementById('hub').className = 'page';
            document.getElementById('panelView').className = 'page active';
            document.getElementById('pTitle').innerText = p + " Panel";
            updateSub('p');
            render();
        };

        window.saveData = () => {
            const id = document.getElementById('editId').value;
            const data = { 
                parent: document.getElementById('pTitle').innerText.split(' ')[0], 
                cat: document.getElementById('catSelect').value,
                sub: document.getElementById('subSelect').value,
                date: document.getElementById('dateIn').value, 
                name: document.getElementById('nameIn').value, 
                amount: document.getElementById('amtIn').value, 
                type: document.getElementById('typeIn').value 
            };
            if(id) { update(ref(db, 'records/' + id), data).then(() => resetForm()); }
            else { push(ref(db, 'records'), data); }
        };

        window.editEntry = (id) => {
            const r = allRecords.find(x => x.id === id);
            document.getElementById('editId').value = r.id;
            document.getElementById('catSelect').value = r.cat;
            updateSub('p');
            document.getElementById('subSelect').value = r.sub;
            document.getElementById('dateIn').value = r.date;
            document.getElementById('nameIn').value = r.name;
            document.getElementById('amtIn').value = r.amount;
            document.getElementById('typeIn').value = r.type;
            document.getElementById('saveBtn').innerText = "Update Record";
        };

        function resetForm() { document.getElementById('editId').value = ''; document.getElementById('saveBtn').innerText = "Save Data"; }

        onValue(ref(db, 'records'), (s) => {
            const data = s.val();
            allRecords = data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : [];
            render();
            updateSub('g');
        });

        window.render = () => {
            const p = document.getElementById('pTitle').innerText.split(' ')[0];
            const cat = document.getElementById('catSelect').value;
            const sub = document.getElementById('subSelect').value;
            const search = document.getElementById('nameFilter').value.toLowerCase();
            let list = allRecords.filter(r => r.parent === p && r.cat === cat && r.sub === sub && r.name.toLowerCase().includes(search));
            
            const rec = list.filter(r => r.type === 'Receive').reduce((a,b) => a + Number(b.amount || 0), 0);
            const pro = list.filter(r => r.type === 'Provide').reduce((a,b) => a + Number(b.amount || 0), 0);
            document.getElementById('sumRec').innerText = rec;
            document.getElementById('sumPro').innerText = pro;
            document.getElementById('sumBal').innerText = (rec - pro);
            document.getElementById('displayArea').innerHTML = list.map(r => `
                <div class="card">
                    <div>${r.date}<br><b>${r.name}</b> (${r.sub})<br>${r.type}: ${r.amount}</div>
                    <div>
                        <button onclick="editEntry('${r.id}')" style="background:none; border:none; cursor:pointer;">✏️</button>
                        <button onclick="removeEntry('${r.id}')" style="color:red; background:none; border:none; cursor:pointer;">❌</button>
                    </div>
                </div>`).join('');
        };

        window.searchGlobal = () => {
            const p = document.getElementById('gPanel').value, d = document.getElementById('gDate').value, c = document.getElementById('gCat').value, s = document.getElementById('gSub').value;
            let list = allRecords.filter(r => r.parent === p && r.cat === c && r.sub === s);
            if(d) list = list.filter(r => r.date === d);
            const rec = list.filter(r => r.type === 'Receive').reduce((a,b) => a + Number(b.amount || 0), 0);
            const pro = list.filter(r => r.type === 'Provide').reduce((a,b) => a + Number(b.amount || 0), 0);
            document.getElementById('totalsArea').style.display = 'flex';
            document.getElementById('gRec').innerText = rec; document.getElementById('gPro').innerText = pro; document.getElementById('gBal').innerText = (rec - pro);
            document.getElementById('gResults').innerHTML = list.map(r => `<div class="card"><div>${r.name}<br>${r.amount}</div></div>`).join('');
        };
    </script>
</body>
</html>
