<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>IDC Business Suite</title>
    <style>
        :root { --bg: #0b0b0e; --surface: #16161a; --primary: #00ff88; --received: #00ff88; --sent: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 10px; margin: 0; padding-bottom: 80px; }
        .page { display: none; } .active { display: block; }
        
        h2 { margin: 10px 0; font-size: 1.4em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { background: var(--surface); border: 1px solid #333; padding: 12px; color: white; border-radius: 8px; cursor: pointer; font-size: 0.9em; }
        
        .input { width: 100%; padding: 8px; margin: 4px 0; background: var(--surface); color: white; border: 1px solid #333; border-radius: 6px; box-sizing: border-box; }
        #editorArea { margin-top: 10px; padding: 10px; border: 1px solid #333; border-radius: 8px; }
        
        .summary-box { background: #1a1a1f; padding: 10px; border-radius: 8px; border: 1px solid #333; margin: 10px 0; display: flex; justify-content: space-around; text-align: center; font-size: 0.85em; }
        .table-view { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .card { background: var(--surface); padding: 8px; margin: 5px 0; border-left: 4px solid var(--primary); font-size: 0.85em; border-radius: 4px; }
        
        /* Fixed Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #16161a; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { background: none; border: none; color: #888; display: flex; flex-direction: column; align-items: center; font-size: 0.7em; cursor: pointer; }
        
        #stockContainer { display: none; width: 100%; height: 75vh; margin-top: 10px; }
        #stockFrame { width: 100%; height: 100%; border: none; background: var(--bg); }
    </style>
</head>
<body>

    <div id="hub" class="page active">
        <h2>IDC Dashboard</h2>
        <div class="grid">
            <button class="btn" onclick="openPanel('Shop')">Shop Panel</button>
            <button class="btn" onclick="openPanel('Factory')">Factory Panel</button>
        </div>
    </div>

    <div id="panelView" class="page">
        <button class="btn" onclick="location.reload()">← Back</button>
        <h2 id="pTitle"></h2>
        <div id="stockContainer"></div>
        <div id="accountContent">
            <div id="summaryArea" class="summary-box" style="display:none;">
                <div><span>Loan/Rec</span><br><b id="sumRec">0</b></div>
                <div><span>Paid/Sent</span><br><b id="sumSent">0</b></div>
                <div>Balance<br><b id="sumBal">0</b></div>
            </div>
            <div id="subTabs" class="grid"></div>
            <div id="editorArea" style="display:none;">
                <input type="date" id="dateIn" class="input">
                <input type="text" id="nameIn" class="input" placeholder="Product/Detail">
                <input type="number" id="amtIn" class="input" placeholder="Amount">
                <select id="moveType" class="input">
                    <option value="Received">Loan/Received</option>
                    <option value="Sale">Paid/Sent</option>
                </select>
                <button class="btn" style="width:100%; background:var(--primary); color:black;" onclick="saveEntry()">Save Data</button>
            </div>
            <div id="displayArea" class="table-view" style="display:none;">
                <div id="receivedList"><h4>Received</h4></div>
                <div id="saleList"><h4>Sent</h4></div>
            </div>
            <div id="simpleList" style="margin-top:10px;"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item" onclick="location.reload()">⚙️<span>CONTROL</span></button>
        <button class="nav-item">📝<span>MANAGE</span></button>
        <button class="nav-item">🔍<span>SEARCH</span></button>
        <button class="nav-item">📊<span>STATUS</span></button>
        <button class="nav-item">⚠️<span>ALERTS</span></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://idcstock-default-rtdb.firebaseio.com/" }));
        let state = { parent: '', sub: '', finalSub: '' };
        
        window.openPanel = (p) => {
            document.getElementById('hub').className = 'page';
            document.getElementById('panelView').className = 'page active';
            document.getElementById('pTitle').innerText = p + " Panel";
            state.parent = p;
            const structure = { "Shop": ["Purchasing", "Stock"], "Factory": ["Purchasing", "Stock"] };
            document.getElementById('subTabs').innerHTML = structure[p].map(t => `<button class="btn" onclick="selectCategory('${t}')">${t}</button>`).join('');
        };

        window.selectCategory = (sub) => {
            if(sub === 'Stock') {
                document.getElementById('accountContent').style.display = 'none';
                document.getElementById('stockContainer').style.display = 'block';
                if(!document.getElementById('stockFrame')) document.getElementById('stockContainer').innerHTML = `<iframe id="stockFrame" src="stock.html" style="width:100%; height:100%; border:none;"></iframe>`;
            }
        };

        window.saveEntry = () => {
            push(ref(db, 'records'), { parent: state.parent, sub: state.sub, name: document.getElementById('nameIn').value, total: document.getElementById('amtIn').value }).then(() => alert("Saved!"));
        };
    </script>
</body>
</html>
