<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hadi | Inventory</title>
    </head>
<body class="manager-mode">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = { databaseURL: "https://idcstock-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let localProducts = {};
        let localCategories = [];
        let systemPin = "9911"; 
        let isManagerMode = true;

        const getBDate = () => {
            const d = new Date();
            const p = new Date(d.toLocaleString("en-US", {timeZone: "Asia/Karachi"}));
            if (p.getHours() < 5) p.setDate(p.getDate() - 1);
            return p.toDateString();
        };

        // Fetch data from Firebase
        onValue(ref(db, 'settings/adminPin'), s => { if(s.val()) systemPin = s.val(); });
        onValue(ref(db, 'categories'), s => { 
            localCategories = s.val() ? Object.values(s.val()) : [{name: "General"}]; 
            renderAll(); 
        });
        onValue(ref(db, 'products'), s => { 
            localProducts = s.val() || {}; 
            renderAll(); 
            calculateTotals(); 
        });

        function calculateTotals() {
            let v = 0, p = 0, sl = 0;
            const b = getBDate();
            Object.values(localProducts).forEach(i => {
                const q = parseInt(i.qty) || 0;
                const pr = parseFloat(i.price.toString().replace(/[^0-9.]/g, '')) || 0;
                v += (q * pr);
                if (i.purchaseLog && i.purchaseLog[b]) p += (i.purchaseLog[b] * pr);
                if (i.salesLog && i.salesLog[b]) sl += (i.salesLog[b] * pr);
            });
            const elTotal = document.getElementById('stat-total-value');
            const elPur = document.getElementById('stat-today-purchase');
            const elSale = document.getElementById('stat-today-sale');
            if(elTotal) elTotal.innerText = "Rs. " + v.toLocaleString();
            if(elPur) elPur.innerText = "Rs. " + p.toLocaleString();
            if(elSale) elSale.innerText = "Rs. " + sl.toLocaleString();
        }

        window.adjustStock = (id, d) => {
            const i = localProducts[id];
            if (!i) return;
            const b = getBDate();
            const u = {};
            if (d > 0) {
                const c = (i.purchaseLog && i.purchaseLog[b]) ? i.purchaseLog[b] : 0;
                u[`products/${id}/purchaseLog/${b}`] = c + d;
            } else {
                if (i.qty <= 0) return;
                const c = (i.salesLog && i.salesLog[b]) ? i.salesLog[b] : 0;
                u[`products/${id}/salesLog/${b}`] = c + 1;
            }
            u[`products/${id}/qty`] = Math.max(0, (parseInt(i.qty) || 0) + d);
            update(ref(db), u);
        };

        window.addNewProduct = () => {
            const n = document.getElementById('new-name').value.trim();
            const p = document.getElementById('new-price').value.trim();
            const q = parseInt(document.getElementById('new-qty').value) || 0;
            const id = "item_" + Date.now();
            set(ref(db, 'products/' + id), { id, name: n, price: p, qty: q, category: "General" });
        };

        window.deleteProd = id => { if(confirm("Permanently delete this product?")) remove(ref(db, 'products/' + id)); };

        function renderAll() {
            // Include your full rendering logic here (map, filter, etc.)
            console.log("Rendering products...", localProducts);
        }

        window.handleAuth = () => { /* Add your auth toggle logic */ };
        window.switchPage = (id, title, tab) => { /* Add your navigation logic */ };
        
        window.renderAll = renderAll;
    </script>
</body>
</html>
