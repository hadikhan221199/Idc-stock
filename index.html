<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>IDC Stock Sync</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e1e24">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #121214; color: #e1e1e6; padding-bottom: 80px; }
        header { background-color: #1e1e24; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #29292e; position: sticky; top: 0; z-index: 10; }
        
        .page { display: none; padding: 15px; }
        .active { display: block; }
        
        /* Add Product Form Box */
        .add-box { background: #1e1e24; border: 1px dashed #04d361; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .add-box h3 { margin-bottom: 10px; font-size: 14px; color: #04d361; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 8px; }
        .input-field { flex: 1; padding: 12px; background: #121214; border: 1px solid #29292e; color: #fff; border-radius: 6px; font-size: 14px; }
        .input-field:focus { border-color: #04d361; outline: none; }
        .add-btn { width: 100%; background: #04d361; color: #121214; font-weight: bold; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        
        /* Search Bar Setup */
        .search-bar { width: 100%; padding: 16px; font-size: 18px; background: #1e1e24; border: 2px solid #29292e; color: #fff; border-radius: 12px; margin-bottom: 15px; }
        .search-bar:focus { border-color: #04d361; outline: none; }
        
        /* Item Display Cards */
        .product-card { background: #1e1e24; padding: 16px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #29292e; }
        .product-info { display: flex; flex-direction: column; gap: 8px; }
        .product-name { font-size: 16px; font-weight: 500; word-break: break-word; }
        .product-price { font-size: 18px; font-weight: bold; color: #04d361; white-space: nowrap; }
        
        /* Action Buttons */
        .action-row { display: flex; gap: 8px; }
        .edit-btn { background: #323238; color: #a8a8b3; border: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .delete-btn { background: #291415; color: #f75a68; border: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        
        /* Bottom Navigation Setup */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: #1e1e24; display: flex; border-top: 1px solid #29292e; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #a8a8b3; background: none; border: none; font-size: 12px; }
        .nav-item.active-tab { color: #04d361; font-weight: bold; }
    </style>
</head>
<body>

    <header id="app-title">📦 IDC Stock Inventory</header>

    <div id="page1" class="page active">
        <div class="add-box">
            <h3>➕ Add New Product</h3>
            <div class="input-group">
                <input type="text" id="new-name" class="input-field" placeholder="Product Name">
                <input type="text" id="new-price" class="input-field" placeholder="Price (e.g. Rs. 500)">
            </div>
            <button class="add-btn" onclick="addNewProduct()">Add to Cloud Database</button>
        </div>
        
        <div id="inventory-list">
            <p style="text-align: center; color: #a8a8b3; margin-top: 20px;">Connecting to IDC Cloud Database...</p>
        </div>
    </div>

    <div id="page2" class="page">
        <input type="text" id="search-input" class="search-bar" placeholder="Type name to find instantly..." oninput="searchProducts()">
        <div id="search-results"></div>
    </div>

    <div class="bottom-nav">
        <button id="tab1" class="nav-item active-tab" onclick="switchPage('page1', '📦 IDC Stock Inventory', 'tab1')">📦 All Items</button>
        <button id="tab2" class="nav-item" onclick="switchPage('page2', '🔍 Fast Search Engine', 'tab2')">🔍 Fast Search</button>
    </div>

    <script type="module">
        // Inject Firebase via fast streaming CDN modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Connection payload tied to your customized database instance
        const firebaseConfig = {
            databaseURL: "https://idcstock-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const productsRef = ref(db, 'products');

        let localProducts = {};

        // 🔄 Realtime Stream Connection Pipeline
        onValue(productsRef, (snapshot) => {
            const data = snapshot.val();
            localProducts = data ? data : {};
            renderInventory();
            searchProducts(); 
        });

        // Add Product Flow Engine
        window.addNewProduct = function() {
            const nameInput = document.getElementById('new-name');
            const priceInput = document.getElementById('new-price');
            const name = nameInput.value.trim();
            const price = priceInput.value.trim();

            if (!name || !price) {
                alert("Please fill out both the Name and Price fields.");
                return;
            }

            const uniqueId = "item_" + Date.now();
            const itemRef = ref(db, 'products/' + uniqueId);
            
            update(itemRef, { id: uniqueId, name: name, price: price }).then(() => {
                nameInput.value = '';
                priceInput.value = '';
            });
        };

        // UI Array Builder Engine
        window.renderInventory = function() {
            const container = document.getElementById('inventory-list');
            const itemsArray = Object.values(localProducts).sort((a,b) => a.name.localeCompare(b.name));
            
            if (itemsArray.length === 0) {
                container.innerHTML = `<p style="text-align: center; color: #a8a8b3; margin-top: 20px;">No products found. Add your first item above!</p>`;
                return;
            }

            container.innerHTML = itemsArray.map(p => `
                <div class="product-card">
                    <div class="product-info">
                        <span class="product-name">${p.name}</span>
                        <div class="action-row">
                            <button class="edit-btn" onclick="editProduct('${p.id}', '${p.name}', '${p.price}')">✏️ Edit</button>
                            <button class="delete-btn" onclick="deleteProduct('${p.id}')">🗑️ Delete</button>
                        </div>
                    </div>
                    <span class="product-price">${p.price}</span>
                </div>
            `).join('');
        };

        // Data Management Mutation Pipelines
        window.editProduct = function(id, currentName, currentPrice) {
            const newName = prompt("Update Item Name:", currentName);
            const newPrice = prompt("Update Item Price:", currentPrice);
            
            if (newName && newPrice) {
                update(ref(db, 'products/' + id), { name: newName, price: newPrice });
            }
        };

        window.deleteProduct = function(id) {
            if (confirm("Are you sure you want to delete this product?")) {
                remove(ref(db, 'products/' + id));
            }
        };

        // Local Memory In-RAM Search Engine (Instant Filtering)
        window.searchProducts = function() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const container = document.getElementById('search-results');
            
            if (query === "") {
                container.innerHTML = `<p style="color: #a8a8b3; text-align:center; margin-top:20px;">Type a product name above to filter immediately...</p>`;
                return;
            }

            const itemsArray = Object.values(localProducts);
            const filtered = itemsArray.filter(p => p.name.toLowerCase().includes(query));

            if (filtered.length === 0) {
                container.innerHTML = `<p style="color: #f75a68; text-align:center; margin-top:20px;">No matches found in database.</p>`;
                return;
            }

            container.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-info">
                        <span class="product-name">${p.name}</span>
                    </div>
                    <span class="product-price">${p.price}</span>
                </div>
            `).join('');
        };

        // Tab Layout Controller Setup
        window.switchPage = function(pageId, title, tabId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById(tabId).classList.add('active-tab');
            document.getElementById('app-title').innerText = title;
            
            if (pageId === 'page2') {
                const searchInput = document.getElementById('search-input');
                searchInput.value = '';
                searchInput.focus();
                searchProducts();
            }
        };
    </script>
</body>
</html>
