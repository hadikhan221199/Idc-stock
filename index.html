<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDC Main Dashboard</title>
    <style>
        body { 
            background: #0b0b0e; 
            color: #fff; 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        h1 { margin-bottom: 40px; color: #00ff88; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 400px; margin: auto; }
        .btn { 
            padding: 25px; 
            background: #16161a; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1.1em; 
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { border-color: #00ff88; background: #1c1c22; }
        #viewArea { width: 100%; height: 90vh; border: none; margin-top: 20px; display: none; }
        .back-btn { 
            margin-bottom: 10px; 
            padding: 10px 20px; 
            background: #222; 
            color: #aaa; 
            border: 1px solid #444; 
            border-radius: 6px; 
            cursor: pointer; 
            display: none; 
        }
    </style>
</head>
<body>
    <h1 id="mainTitle">IDC Business Suite</h1>
    
    <div id="nav" class="grid">
        <button class="btn" onclick="loadPage('shop&factory.html')">SHOP & FACTORY MANAGEMENT</button>
        <button class="btn" onclick="loadPage('stock.html')">STOCK MANAGEMENT</button>
    </div>

    <button id="backBtn" class="back-btn" onclick="location.reload()">← Back to Main Menu</button>
    <iframe id="viewArea"></iframe>

    <script>
        function loadPage(url) {
            document.getElementById('nav').style.display = 'none';
            document.getElementById('mainTitle').style.display = 'none';
            
            let frame = document.getElementById('viewArea');
            frame.src = url;
            frame.style.display = 'block';
            
            document.getElementById('backBtn').style.display = 'inline-block';
        }
    </script>
</body>
</html>
