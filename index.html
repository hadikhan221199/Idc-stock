<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDC Business Manager</title>
    </head>
<body>
    <div id="login-page" class="page active">
        <input type="password" id="key" placeholder="Enter Access Key" class="input">
        <button class="btn" onclick="checkLogin()">Enter</button>
    </div>

    <div id="main-hub" class="page">
        <h1 id="user-role"></h1>
        <div class="grid">
            <button class="btn" onclick="openPanel('Shop')">Shop Panel</button>
            <button class="btn" onclick="openPanel('Factory')">Factory Panel</button>
        </div>
    </div>
    
    <div id="content-area" class="page">
        <h2 id="panel-title"></h2>
        <div id="tree-menu" class="grid"></div>
        <div id="ledger-view"></div>
    </div>

    <script type="module">
        // Logic for role-based filtering:
        // Owner sees everything, Manager is filtered via 'if' statements
        // Every transaction saves with { parent, module, sub, party, invoice, date }
    </script>
</body>
</html>
