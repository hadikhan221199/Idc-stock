<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>IDC Business Suite</title>
    <style>
        :root { --bg: #0b0b0e; --surface: #16161a; --primary: #00ff88; --received: #00ff88; --sent: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .page { display: none; } .active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: var(--surface); border: 1px solid #333; padding: 15px; color: white; border-radius: 8px; cursor: pointer; }
        .input { width: 100%; padding: 10px; margin: 5px 0; background: var(--surface); color: white; border: 1px solid #333; box-sizing: border-box; }
        .card { background: var(--surface); padding: 10px; margin: 5px 0; border-left: 4px solid var(--primary); font-size: 0.9em; }
        .summary-box { background: #222; padding: 15px; border-radius: 8px; border: 1px solid var(--primary); margin-bottom: 20px; display: flex; justify-content: space-around; text-align: center; }
        .table-view { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        /* Iframe Styles */
        #stockContainer { display: none; width: 100%; height: 80vh; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="hub" class="page active">
        <h2>IDC Dashboard</h2>
        <div class="grid">
            <button class="btn" onclick="openPanel('Shop')">Shop Panel</button>
            <button class="btn" onclick="openPanel('Factory')">Factory Panel</button>
        </div>
        
        <div style="margin-top: 30px; padding: 15px; border: 1px solid var(--primary); border-radius: 8px;">
            <h3>🔍 Filter or Retrieve Data</h3>
            <input type="date" id="globalDate" class="input">
            <input type="text" id="globalName" class="input" placeholder="Search by Name/Detail...">
            <select id="globalCategory" class="input">
                <option value="">All Categories</option>
                <optgroup label="Shop">
                    <option value="Purchasing">Purchasing</option>
                    <option value="Expenses">Expenses</option>
                    <option value="Salary">Salary</option>
                    <option value="Loan">Loan</option>
                    <option value="Supply">Supply</option>
                    <option value="Stock">Stock</option>
                </optgroup>
            </select>
            <button class="btn" style="width:100%; margin-top:10px; background:var(--primary); color:black; font-weight:bold;" onclick="searchGlobal()">Search Results</button>
            <div id="globalResults"></div>
        </div>
    </div>

    <div id="panelView" class="page">
        <button class="btn" onclick="location.reload()">← Back</button>
        <h2 id="pTitle"></h2>
        
        <div id="stockContainer"></div>

        <div id="accountContent">
            <div id="summaryArea" class="summary-box" style="display:none;">
                <div><span id="labelL">Loan</span><br><b id="sumRec" style="color:var(--received)">0</b></div>
                <div><span id="labelP">Paid</span><br><b id="sumSent" style="color:var(--sent)">0</b></div>
                <div>Balance<br><b id="sumBal">0</b></div>
            </div>

            <div id="subTabs" class="grid"></div>
            
            <div id="editorArea" style="display:none; margin-top:20px; border:1px solid #333; padding:10px;">
                <input type="date" id="dateIn" class="input">
                <input type="text" id="nameIn" class="input" placeholder="Product/Detail">
                <input type="number" id="amtIn" class="input" placeholder="Amount">
                <select id="moveType" class="input">
                    <option value="Received" id="optL">Loan/Received</option>
                    <option value="Sale" id="optP">Paid/Sent</option>
                </select>
                <button class="btn" style="width:100%; background:var(--primary); color:black;" onclick="saveEntry()">Save Data</button>
            </div>

            <div id="displayArea" class="table-view" style="display:none;">
                <div id="receivedList"><h4 id="headL">Loan</h4></div>
                <div id="saleList"><h4 id="headP">Paid</h4></div>
            </div>
            <div id="simpleList" style="margin-top:20px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const db = getDatabase(initializeApp({ databaseURL: "https://idcstock-default-rtdb.firebaseio.com/" }));
        let state = { parent: '', sub: '', finalSub: '' };
        let allRecords = [];

        const structure = {
            "Shop": ["Purchasing", "Expenses", "Salary", "Loan", "Supply", "Stock"],
            "Factory": ["Purchasing", "Salary", "Expenses", "Supply", "Loan", "Stock"]
        };
        const subCategories = {
            "Purchasing": ["Counter", "Abdullah", "Heera"],
            "Salary": ["Daily Wages", "Monthly"],
            "Loan": ["Loan"],
            "Supply": ["Shop", "Arshan", "Gillani", "T.Chowk", "Moor", "Haris", "Amjad Multan", "Amjad Shujabad", "Factory Sale"]
        };

        // --- Iframe Logic ---
        window.selectCategory = (sub) => {
            if(sub === 'Stock') {
                document.getElementById('accountContent').style.display = 'none';
                const container = document.getElementById('stockContainer');
                container.style.display = 'block';
                if(!document.getElementById('stockFrame')) {
                    container.innerHTML = `<iframe id="stockFrame" src="stock.html" style="width:100%; height:100%; border:none;"></iframe>`;
                }
            } else {
                state.sub = sub;
                // Purani logic chalti rahegi
                if (subCategories[sub]) {
                    document.getElementById('subTabs').innerHTML = subCategories[sub].map(t => `<button class="btn" style="border: 1px solid var(--primary)" onclick="setFinalSub('${t}')">${t}</button>`).join('');
                } else { setFinalSub(sub); }
            }
        };

        // --- Baki purana code waise hi rahega ---
        onValue(ref(db, 'records'), (s) => {
            const data = s.val();
            allRecords = data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : [];
            if (state.finalSub) render();
        });

        window.openPanel = (p) => {
            document.getElementById('hub').className = 'page';
            document.getElementById('panelView').className = 'page active';
            document.getElementById('pTitle').innerText = p + " Panel";
            state.parent = p;
            document.getElementById('subTabs').innerHTML = structure[p].map(t => `<button class="btn" onclick="selectCategory('${t}')">${t}</button>`).join('');
        };

        window.setFinalSub = (finalSub) => {
            state.finalSub = finalSub;
            document.getElementById('pTitle').innerText = `${state.parent} > ${state.sub} > ${finalSub}`;
            document.getElementById('subTabs').innerHTML = (state.sub === 'Loan') ? `<input type="text" id="nameFilter" class="input" placeholder="Enter Name..."><button class="btn" style="width:100%" onclick="render()">Get Result</button>` : '';
            document.getElementById('editorArea').style.display = 'block';
            const isSpecial = (state.sub === 'Loan' || state.sub === 'Supply');
            document.getElementById('moveType').style.display = isSpecial ? 'block' : 'none';
            render();
        };

        window.saveEntry = () => {
            const isSpecial = (state.sub === 'Loan' || state.sub === 'Supply');
            push(ref(db, 'records'), { 
                parent: state.parent, sub: state.sub, finalSub: state.finalSub,
                date: document.getElementById('dateIn').value,
                name: document.getElementById('nameIn').value,
                total: document.getElementById('amtIn').value,
                type: isSpecial ? document.getElementById('moveType').value : 'Entry'
            }).then(() => { alert("Saved!"); render(); });
        };

        window.render = () => {
            const filter = document.getElementById('nameFilter') ? document.getElementById('nameFilter').value.toLowerCase() : "";
            let list = allRecords.filter(r => r.parent === state.parent && r.sub === state.sub && r.finalSub === state.finalSub);
            if (state.sub === 'Loan' && filter !== "") list = list.filter(r => r.name.toLowerCase().includes(filter));

            const isSpecial = (state.sub === 'Loan' || state.sub === 'Supply');

            document.getElementById('summaryArea').style.display = isSpecial ? 'flex' : 'none';
            document.getElementById('displayArea').style.display = isSpecial ? 'grid' : 'none';
            document.getElementById('simpleList').style.display = isSpecial ? 'none' : 'block';

            if (isSpecial) {
                const isLoan = (state.sub === 'Loan');
                document.getElementById('labelL').innerText = isLoan ? "Total Loan" : "Received";
                document.getElementById('labelP').innerText = isLoan ? "Total Paid" : "Sent";
                
                const rec = list.filter(r => r.type === 'Received').reduce((sum, r) => sum + Number(r.total || 0), 0);
                const sent = list.filter(r => r.type === 'Sale').reduce((sum, r) => sum + Number(r.total || 0), 0);
                document.getElementById('sumRec').innerText = rec;
                document.getElementById('sumSent').innerText = sent;
                document.getElementById('sumBal').innerText = (rec - sent);
                
                document.getElementById('receivedList').innerHTML = `<h4>${isLoan ? 'Loan' : 'Received'}</h4>` + list.filter(r => r.type === 'Received').map(r => `<div class="card">${r.date} | ${r.name}: ${r.total} <button onclick="remove(ref(db, 'records/${r.id}'))" style="background:none; border:none; color:red; cursor:pointer;">[X]</button></div>`).join('');
                document.getElementById('saleList').innerHTML = `<h4>${isLoan ? 'Paid' : 'Sent'}</h4>` + list.filter(r => r.type === 'Sale').map(r => `<div class="card">${r.date} | ${r.name}: ${r.total} <button onclick="remove(ref(db, 'records/${r.id}'))" style="background:none; border:none; color:red; cursor:pointer;">[X]</button></div>`).join('');
            } else {
                document.getElementById('simpleList').innerHTML = list.map(r => `<div class="card">${r.date} | ${r.name}: ${r.total} <button onclick="remove(ref(db, 'records/${r.id}'))" style="background:none; border:none; color:red; cursor:pointer;">[X]</button></div>`).join('');
            }
        };

        window.searchGlobal = () => { /* ... */ };
    </script>
</body>
</html>
