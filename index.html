<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hadi | Inventory</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <style>
    .admin-only {
    display: none !important;
    }
        :root {
            --bg: #0b0b0e;
            --surface: #16161a;
            --border: #2d2d35;
            --primary: #00ff88;
            --secondary: #ff9d00;
            --danger: #ff4757;
            --text-main: #ffffff;
            --text-dim: #a0a0ab;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            background-color: var(--bg) !important; 
            color: var(--text-main) !important; 
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        header { 
            background: rgba(11, 11, 14, 0.9);
            backdrop-filter: blur(10px);
            padding: 18px 20px; 
            border-bottom: 1px solid var(--border); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .brand-container { display: flex; align-items: center; gap: 8px; }
        .brand-logo { font-size: 1.2rem; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
        .brand-separator { color: var(--border); font-weight: 300; font-size: 1.2rem; }
        header h1 { font-size: 1rem; letter-spacing: 0.5px; color: var(--primary); text-transform: uppercase; font-weight: 600; }

        .toggle-container { 
            display: flex; align-items: center; gap: 8px; font-size: 11px; 
            background: var(--surface); padding: 8px 14px; border-radius: 30px; 
            border: 1px solid var(--border); cursor: pointer; transition: 0.3s;
            color: var(--text-main);
        }
        .toggle-dot { width: 8px; height: 8px; background: var(--secondary); border-radius: 50%; box-shadow: 0 0 10px var(--secondary); }
        .manager-active .toggle-dot { background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease; background-color: var(--bg); }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .stat-card { 
            background: var(--surface); padding: 20px; border-radius: 16px; 
            border: 1px solid var(--border); position: relative; overflow: hidden;
        }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); }
        .full-width { grid-column: span 2; }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { display: block; font-size: 20px; font-weight: 700; margin-top: 8px; color: #fff; }

        /* Input & Card Blocks */
        .add-box { background: var(--surface); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        .add-box.category-box { border-color: var(--secondary); }
        .add-box h3 { font-size: 12px; color: var(--text-dim); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .input-field { 
            width: 100%; padding: 14px; background: var(--bg); border: 1px solid var(--border); 
            color: #fff; border-radius: 10px; font-size: 14px; transition: 0.3s;
        }
        .input-field:focus { border-color: var(--primary); outline: none; background: #1a1a20; }
        .add-btn { 
            width: 100%; background: var(--primary); color: #000; font-weight: 700; 
            border: none; padding: 15px; border-radius: 10px; cursor: pointer; 
            margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;
        }
        .pin-btn { background: #26262b; color: #fff; margin-top: 15px; border: 1px solid var(--border); width: 100%; }

        /* Chips */
        .chip-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .cat-chip { background: var(--bg); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 6px; }

        /* Product Cards */
        .product-card { 
            background: var(--surface) !important; 
            padding: 18px; 
            border-radius: 16px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid var(--border) !important; 
            transition: 0.2s;
            color: var(--text-main);
        }
        .product-card:active { transform: scale(0.98); background: #1c1c22; }
        .product-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: #fff; }
        .tag-row { display: flex; gap: 6px; align-items: center; }
        .category-tag { font-size: 10px; color: var(--secondary); font-weight: 700; }
        .unit-tag { font-size: 9px; background: var(--glass); padding: 2px 6px; border-radius: 4px; color: var(--text-dim); }
        .delete-btn { background: rgba(255, 71, 87, 0.1); color: var(--danger); border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; margin-top: 8px; cursor: pointer; }

        .qty-controls { display: flex; align-items: center; gap: 12px; background: var(--bg); padding: 6px; border-radius: 12px; border: 1px solid var(--border); }
        .qty-btn { 
            width: 38px; height: 38px; border-radius: 8px; border: none; 
            font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .btn-plus { background: rgba(0, 255, 136, 0.1); color: var(--primary); }
        .btn-minus { background: rgba(255, 71, 87, 0.1); color: var(--danger); }

        /* Navigation */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px; 
            background: rgba(22, 22, 26, 0.95); backdrop-filter: blur(15px);
            display: flex; border-top: 1px solid var(--border); padding: 0 10px;
            z-index: 200;
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: var(--text-dim); border: none; background: none;
            gap: 5px; transition: 0.3s; cursor: pointer;
        }
        .nav-item b { font-size: 18px; }
        .nav-item span { font-size: 9px; text-transform: uppercase; font-weight: 600; display: block; }
        .active-tab { color: var(--primary); }

        .sale-btn { 
            background: var(--secondary); color: #000; font-weight: 700; 
            border: none; padding: 12px 18px; border-radius: 10px; font-size: 13px;
        }

        body.manager-mode .admin-only { display: none !important; }
    </style>
</head>
<body class="manager-mode">

    <header>
        <div class="brand-container">
            <span class="brand-logo">IDC</span>
            <span class="brand-separator">|</span>
            <h1 id="app-title">Directory</h1>
        </div>
        <div id="mode-toggle" class="toggle-container manager-active" onclick="handleAuth()">
            <div class="toggle-dot"></div>
            <span id="mode-label">Manager</span>
        </div>
    </header>

    <div id="page1" class="page">
        <div class="stats-grid admin-only">
            <div class="stat-card full-width">
                <span class="stat-label">Inventory Value</span>
                <span id="stat-total-value" class="stat-val">Rs. 0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Purchases</span>
                <span id="stat-today-purchase" class="stat-val">Rs. 0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Sales</span>
                <span id="stat-today-sale" class="stat-val" style="color: var(--secondary);">Rs. 0</span>
            </div>
        </div>

        <div class="add-box category-box admin-only">
            <h3 style="color: var(--secondary);">🏷️ Categories & Security</h3>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="new-cat-name" class="input-field" placeholder="New Category Name">
                <button class="add-btn" style="background:var(--secondary); width:auto; padding:0 20px; margin-top:0;" onclick="addCustomCategory()">Add</button>
            </div>
            <div class="chip-list" id="category-chips"></div>
            <button class="add-btn pin-btn" onclick="changeSystemPin()">🔐 Change Admin PIN</button>
        </div>

        <div class="add-box admin-only">
            <h3>Configure Item</h3>
            <div class="input-group">
                <input type="text" id="new-name" class="input-field" placeholder="Product Name">
                <input type="text" id="new-price" class="input-field" placeholder="Price">
                <input type="number" id="new-qty" class="input-field" placeholder="Opening Stock" value="0">
                <select id="new-category" class="input-field"></select>
                <select id="new-unit-type" class="input-field">
                    <option value="Piece">Piece / Packet</option>
                    <option value="Carton">Carton (Cotton)</option>
                </select>
            </div>
            <button class="add-btn" onclick="addNewProduct()">Save to Cloud</button>
        </div>
    </div>

    <div id="page5" class="page admin-only">
        <div class="input-group" style="margin-bottom:20px;">
            <select id="manage-cat-filter" class="input-field" onchange="renderInventory()"></select>
            <input type="text" id="manage-search-input" class="input-field" placeholder="Quick Search..." oninput="renderInventory()">
        </div>
        <div id="inventory-list"></div>
    </div>

    <div id="page2" class="page active">
        <div class="input-group" style="margin-bottom:20px;">
            <select id="search-cat-filter" class="input-field" onchange="searchProducts()"></select>
            <input type="text" id="search-input" class="input-field" placeholder="Find items..." oninput="searchProducts()">
        </div>
        <div id="search-results"></div>
    </div>

    <div id="page3" class="page">
        <select id="status-cat-filter" class="input-field" style="margin-bottom:20px;" onchange="renderStatus()"></select>
        <div id="status-results"></div>
    </div>

    <div id="page4" class="page">
        <div id="shortage-results"></div>
    </div>

    <div class="bottom-nav">
        <button id="tab1" class="nav-item admin-only" onclick="switchPage('page1', 'System Control', 'tab1')"><b>⚙️</b><span>Control</span></button>
        <button id="tab5" class="nav-item admin-only" onclick="switchPage('page5', 'Quick Manage', 'tab5')"><b>📝</b><span>Manage</span></button>
        <button id="tab2" class="nav-item active-tab" onclick="switchPage('page2', 'Directory', 'tab2')"><b>🔍</b><span>Search</span></button>
        <button id="tab3" class="nav-item" onclick="switchPage('page3', 'Live Status', 'tab3')"><b>📊</b><span>Status</span></button>
        <button id="tab4" class="nav-item" onclick="switchPage('page4', 'Alerts', 'tab4')"><b>⚠️</b><span>Alerts</span></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://idcstock-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let localProducts = {};
        let localCategories = [];
        let systemPin = "1234"; 
        let isManagerMode = true;

        const getBDate = () => {
            const d = new Date();
            const p = new Date(d.toLocaleString("en-US", {timeZone: "Asia/Karachi"}));
            if (p.getHours() < 5) p.setDate(p.getDate() - 1);
            return p.toDateString();
        };

        onValue(ref(db, 'settings/adminPin'), s => { if(s.val()) systemPin = s.val(); });
        
        onValue(ref(db, 'categories'), s => {
            localCategories = s.val() ? Object.values(s.val()) : [{name: "General"}];
            const h = `<option value="ALL">All Categories</option>` + localCategories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('new-category').innerHTML = h;
            document.getElementById('search-cat-filter').innerHTML = h;
            document.getElementById('status-cat-filter').innerHTML = h;
            document.getElementById('manage-cat-filter').innerHTML = h;
            renderChips();
        });

        onValue(ref(db, 'products'), s => {
            localProducts = s.val() || {};
            renderAll();
            calculateTotals();
        });

        function calculateTotals() {
            let v = 0, p = 0, sl = 0;
            const b = getBDate();
            Object.values(localProducts).forEach(i => {
                const q = parseInt(i.qty) || 0;
                const pr = parseFloat(i.price.toString().replace(/[^0-9.]/g, '')) || 0;
                v += (q * pr);
                if (i.purchaseLog && i.purchaseLog[b]) p += (i.purchaseLog[b] * pr);
                if (i.salesLog && i.salesLog[b]) sl += (i.salesLog[b] * pr);
            });
            document.getElementById('stat-total-value').innerText = "Rs. " + v.toLocaleString();
            document.getElementById('stat-today-purchase').innerText = "Rs. " + p.toLocaleString();
            document.getElementById('stat-today-sale').innerText = "Rs. " + sl.toLocaleString();
        }

        window.adjustStock = (id, d) => {
            const i = localProducts[id];
            if (!i) return;
            const b = getBDate();
            const u = {};
            if (d > 0) {
                const c = (i.purchaseLog && i.purchaseLog[b]) ? i.purchaseLog[b] : 0;
                u[`products/${id}/purchaseLog/${b}`] = c + d;
            } else {
                if (i.qty <= 0) return;
                const c = (i.salesLog && i.salesLog[b]) ? i.salesLog[b] : 0;
                u[`products/${id}/salesLog/${b}`] = c + 1;
            }
            u[`products/${id}/qty`] = Math.max(0, (parseInt(i.qty) || 0) + d);
            update(ref(db), u);
        };

        window.addNewProduct = () => {
            const n = document.getElementById('new-name').value.trim();
            const p = document.getElementById('new-price').value.trim();
            const q = parseInt(document.getElementById('new-qty').value) || 0;
            const c = document.getElementById('new-category').value;
            const u = document.getElementById('new-unit-type').value;
            if(!n || !p) return alert("Enter name and price");
            const id = "item_" + Date.now();
            const data = { id, name: n, price: p, qty: q, category: c, unitType: u };
            if(q > 0) { data.purchaseLog = {}; data.purchaseLog[getBDate()] = q; }
            set(ref(db, 'products/' + id), data).then(() => {
                document.getElementById('new-name').value = '';
                document.getElementById('new-price').value = '';
                document.getElementById('new-qty').value = '0';
            });
        };

        window.addCustomCategory = () => {
            const n = document.getElementById('new-cat-name').value.trim();
            if(!n) return;
            update(ref(db, 'categories/' + n.toLowerCase()), { name: n });
            document.getElementById('new-cat-name').value = '';
        };

        window.removeCat = n => { if(confirm("Delete category?")) remove(ref(db, 'categories/' + n.toLowerCase())); };

        window.changeSystemPin = () => {
            const newPin = prompt("Enter new PIN (min 4 digits):");
            if (newPin && newPin.length >= 4) { set(ref(db, 'settings/adminPin'), newPin); alert("PIN Updated successfully!"); }
        };

        function renderChips() {
            const container = document.getElementById('category-chips');
            if (!container || isManagerMode) { if(container) container.innerHTML = ''; return; }
            container.innerHTML = localCategories.map(c => `<div class="cat-chip">${c.name} <span style="color:var(--danger);margin-left:5px;cursor:pointer" onclick="removeCat('${c.name}')">×</span></div>`).join('');
        }

        function renderAll() {
            const qS = document.getElementById('search-input').value.toLowerCase();
            const cS = document.getElementById('search-cat-filter').value;
            const qM = document.getElementById('manage-search-input').value.toLowerCase();
            const cM = document.getElementById('manage-cat-filter').value;
            const cSt = document.getElementById('status-cat-filter').value;
            const b = getBDate();

            // Search Panel
            document.getElementById('search-results').innerHTML = Object.values(localProducts)
                .filter(p => (cS === "ALL" || p.category === cS) && p.name.toLowerCase().includes(qS))
                .map(p => `<div class="product-card"><div><p class="product-name">${p.name}</p><div class="tag-row"><span class="category-tag">${p.category || 'General'}</span><span class="unit-tag">${p.unitType || 'Piece'}</span></div><p style="color:var(--primary); font-weight:bold; margin-top:5px;">Rs. ${p.price}</p></div><span class="stat-label" style="text-align:right">Stock: ${p.qty}</span></div>`).join('');

            // Manage Panel
            document.getElementById('inventory-list').innerHTML = Object.values(localProducts)
                .filter(p => (cM === "ALL" || p.category === cM) && p.name.toLowerCase().includes(qM))
                .map(p => `<div class="product-card"><div><p class="product-name">${p.name}</p><div class="tag-row"><span class="category-tag">${p.category || 'General'}</span><span class="unit-tag">${p.unitType || 'Piece'}</span></div><button class="delete-btn" onclick="window.deleteProd('${p.id}')">🗑️ Delete</button></div><div class="qty-controls"><button class="qty-btn btn-minus" onclick="adjustStock('${p.id}', -1)">-</button><b style="min-width:30px; text-align:center; color:#fff;">${p.qty}</b><button class="qty-btn btn-plus" onclick="adjustStock('${p.id}', 1)">+</button></div></div>`).join('');

            // Status Panel - UPDATED
            document.getElementById('status-results').innerHTML = Object.values(localProducts)
                .filter(p => (cSt === "ALL" || p.category === cSt))
                .map(p => {
                    return `<div class="product-card"><div><p class="product-name">${p.name}</p><span class="stat-label">Avail: ${p.qty}</span></div><button class="sale-btn" onclick="adjustStock('${p.id}', -1)">🛒 Sell</button></div>`;
                }).join('');

            // Shortages Panel
            const sh = Object.values(localProducts).filter(p => p.qty <= (p.unitType === "Carton" ? 2 : 3));
            document.getElementById('shortage-results').innerHTML = sh.length ? sh.map(p => `<div class="product-card" style="border-left:4px solid var(--danger)"><div><p class="product-name">${p.name}</p><span class="unit-tag">${p.unitType || 'Piece'}</span></div><b style="color:var(--danger)">${p.qty} Left</b></div>`).join('') : `<p style="text-align:center; color:var(--text-dim); margin-top:40px;">No critical shortages.</p>`;
            
            renderChips();
        }

        window.handleAuth = () => {
        if (isManagerMode) {
        const p = prompt("Admin PIN:");
        if (p === systemPin) {
        sessionStorage.setItem('user_pin', p);
        
        // Remove the class that hides admin buttons
        document.body.classList.remove('manager-mode');
        
        // Redirect to the shop page
        window.location.href = 'shop.html'; 
        } else {
        alert("Incorrect PIN");
        }
        } else {
        sessionStorage.removeItem('user_pin');
        window.location.href = 'index.html';
        }
        };

        function updateUI() {
            document.body.classList.toggle('manager-mode', isManagerMode);
            document.getElementById('mode-label').innerText = isManagerMode ? "Manager" : "Owner";
            document.getElementById('mode-toggle').classList.toggle('manager-active', isManagerMode);
            renderAll();
        }

        window.switchPage = (id, title, tab) => {
            if (isManagerMode && (id === 'page1' || id === 'page5')) return;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            document.getElementById(tab).classList.add('active-tab');
            document.getElementById('app-title').innerText = title;
        };

        window.deleteProd = id => { if(confirm("Permanently delete this product?")) remove(ref(db, 'products/' + id)); };

        window.searchProducts = renderAll;
        window.renderStatus = renderAll;
        window.renderInventory = renderAll;
    </script>
</body>
</html>
