<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hadi | Inventory</title>
    <style>
        :root { --bg: #0b0b0e; --surface: #16161a; --border: #2d2d35; --primary: #00ff88; --secondary: #ff9d00; --text-main: #ffffff; --text-dim: #a0a0ab; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg) !important; color: var(--text-main) !important; padding-bottom: 90px; }
        header { background: #16161a; padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .hub-card { background: var(--surface); border: 1px solid var(--border); padding: 30px; border-radius: 16px; color: white; font-weight: bold; cursor: pointer; text-align: center; }
        .hub-card:active { background: var(--primary); color: black; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #16161a; display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; padding: 15px; border: none; background: none; color: var(--text-dim); cursor: pointer; }
        .nav-item.active-tab { color: var(--primary); }
        body.manager-mode .admin-only { display: none !important; }
        .input-field, .add-btn { width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: white; }
        .add-btn { background: var(--primary); color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="manager-mode">

    <header>
        <h1 id="app-title" style="color:var(--primary); font-size: 1.2rem;">IDC Hub</h1>
        <div onclick="handleAuth()" style="background:var(--surface); padding:8px 15px; border-radius:20px; cursor:pointer; font-size: 12px;">Toggle Mode</div>
    </header>

    <div id="page-hub" class="page active">
        <div class="hub-grid">
            <button class="hub-card" onclick="openModule('Shop')">🛒 Shop</button>
            <button class="hub-card" onclick="openModule('Factory')">🏭 Factory</button>
            <button class="hub-card" onclick="openModule('Accounts')">📊 Accounts</button>
        </div>
    </div>

    <div id="page-modules" class="page">
        <h3 id="module-title">Module</h3>
        <div id="module-content"></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active-tab" onclick="switchPage('page-hub', 'IDC Hub', null)">🏠 Home</button>
        <button id="tab-modules" class="nav-item" onclick="switchPage('page-modules', 'Current Module', 'tab-modules')">⚙️ Modules</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://idcstock-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let localProducts = {};

        onValue(ref(db, 'products'), s => { localProducts = s.val() || {}; });

        window.switchPage = (id, title, tab) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            if(tab) document.getElementById(tab).classList.add('active-tab');
            document.getElementById('app-title').innerText = title;
        };

        window.openModule = (moduleName) => {
            document.getElementById('module-title').innerText = moduleName;
            const filtered = Object.values(localProducts).filter(p => p.category === moduleName);
            document.getElementById('module-content').innerHTML = filtered.length > 0 
                ? filtered.map(p => `<div style="background:#16161a; padding:15px; margin-top:10px; border-radius:10px;">${p.name} - ${p.qty}</div>`).join('')
                : "<p>No items in " + moduleName + "</p>";
            switchPage('page-modules', 'IDC | ' + moduleName, 'tab-modules');
        };

        window.handleAuth = () => {
            document.body.classList.toggle('manager-mode');
        };
    </script>
</body>
</html>
